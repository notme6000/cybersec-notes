[colors]
background = #282A2E
background-alt = #373B41
foreground = #C5C8C6
primary = #F0C674
secondary = #8ABEB7
alert = #A54242
disabled = #707880
green = #1dd419
red = #d41919
blue = #42d1f5
gray = #8c9496
lite-blue = #abd6e0
purple = #cdabe0
lime = #abe0bb
dark-blue = #3636cf
lite-yellow = #d7e892
lime-2 = #bafc03

[bar/main]
width = 100%
height = 24pt
radius = 0

; dpi = 96

background = ${colors.background}
foreground = ${colors.foreground}

line-size = 4pt

border-size = 0pt
border-color = #00000000

padding-left = 0
padding-right = 1

module-margin = 1

font-0 = "JetBrainsMono Nerd Font:style=Regular:size=13;4"
font-1 = "Fira Code:style=Regular:size=13;4" 

modules-left = xworkspaces xwindow
modules-right = battery blacklight pulseaudio memory cpu wlan date

cursor-click = pointer
cursor-scroll = ns-resize

enable-ipc = true

; wm-restack = generic
; wm-restack = bspwm
; wm-restack = i3

override-redirect = false 

; This module is not active by default (to enable it, add it to one of the
; modules-* list above).
; Please note that only a single tray can exist at any time. If you launch
; multiple bars with this module, only a single one will show it, the others
; will produce a warning. Which bar gets the module is timing dependent and can
; be quite random.
; For more information, see the documentation page for this module:
; https://polybar.readthedocs.io/en/stable/user/modules/tray.html

[module/battery]
type = internal/battery

format-charging =  <label-charging> 
format-charging-underline = ${colors.green}

format-discharging = <label-discharging>
format-discharging-underline = ${colors.red}

format-full = <label-full>
format-full-underline = ${colors.lite-blue}

full-at = 99
low-at = 15

label-full = %{F#F0C674}󰂄%{F-} %percentage%%
label-charging = %{F#F0C674}󱟦%{F-} %percentage%%
label-discharging = %{F#F0C674}󱟤%{F-} %percentage%%

battery = BAT0
adapter = ADP1

poll-interval = 5



[module/systray]
type = internal/tray

format-margin = 8pt
tray-spacing = 16pt

[module/xworkspaces]
type = internal/xworkspaces

label-active = %name%
label-active-background = ${colors.background-alt}
label-active-underline= ${colors.primary}
label-active-padding = 1

label-occupied = %name%
label-occupied-padding = 1
label-occupied-underline = ${colors.gray} 

label-urgent = %name%
label-urgent-background = ${colors.alert}
label-urgent-padding = 1

label-empty = %name%
label-empty-foreground = ${colors.disabled}
label-empty-padding = 1
label-empty-underline= ${colors.lite-blue}

[module/xwindow]
type = internal/xwindow
label = %title:0:30:...%
label-underline= ${colors.green}

[module/filesystem]
type = internal/fs
interval = 25

mount-0 = /

label-mounted = %{F#F0C674}%mountpoint%%{F-} %percentage_used%%

label-unmounted = %mountpoint% not mounted
label-unmounted-foreground = ${colors.disabled}

[module/pulseaudio]
type = internal/pulseaudio

format-volume-prefix = "󰕾 "
format-volume-underline = ${colors.blue}
format-volume-prefix-foreground = ${colors.primary}
format-volume = <label-volume>

label-volume = %percentage%%

label-muted = muted
label-muted-underline = ${colors.gray}
label-muted-foreground = ${colors.disabled}

[module/xkeyboard]
type = internal/xkeyboard
blacklist-0 = num lock

label-layout = %layout%
label-layout-foreground = ${colors.primary}

label-indicator-padding = 2
label-indicator-margin = 1
label-indicator-foreground = ${colors.background}
label-indicator-background = ${colors.secondary}

[module/memory]
type = internal/memory
interval = 2
format-prefix = " "
format-prefix-underline = ${colors.purple}
label-underline = ${colors.purple}
format-prefix-foreground = ${colors.primary}
label = %percentage_used:2%%

[module/cpu]
type = internal/cpu
interval = 2
format-prefix = "󰻠"
format-prefix-underline = ${colors.dark-blue}
label-underline = ${colors.dark-blue}
format-prefix-foreground = ${colors.primary}
label = %percentage:2%%

[network-base]
type = internal/network
interval = 5
format-connected = <label-connected>
format-disconnected = <label-disconnected>
label-disconnected = %{F#F0C674}%ifname%%{F#707880} disconnected

[module/wlan]
inherit = network-base
interface-type = wireless
label-connected = %{F#F0C674}%ifname%%{F-} %essid% %local_ip%
label-underline = ${colors.purple}

[module/eth]
inherit = network-base
interface-type = wired
label-connected = %{F#F0C674}%ifname%%{F-} %local_ip%

[module/date]
type = internal/date
interval = 1

date = %I:%M:%S
date-alt = %d-%m-%Y %I:%M:%S

label-underline = ${colors.lime}
label = %date%
label-foreground = ${colors.primary}

[settings]
screenchange-reload = true
pseudo-transparency = true

[module/blacklight]
type = internal/backlight
card = amdgpu_bl1

use-actual-brightness = true
poll-interval = 0
enable-scroll = true
scroll-interval = 10

format = <label>
label = %{F#F0C674}󱄄 %{F-} %percentage%%
label-underline = ${colors.lime-2}



; vim:ft=dosini
